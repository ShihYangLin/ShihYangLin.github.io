document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;\">\n  <header style=\"position:sticky;top:0;z-index:50;background:color-mix(in oklch, var(--bg) 86%, transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--faint);\">\n    <div id=\"siteHeaderInner\" style=\"max-width:940px;margin:0 auto;padding:0 32px;height:66px;display:flex;align-items:center;justify-content:space-between;gap:24px;\">\n      <button id=\"brandBtn\" sc-camel-on-click=\"{{ goHome }}\" style=\"background:none;border:none;padding:0;cursor:pointer;font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:15px;letter-spacing:-0.01em;color:var(--ink);white-space:nowrap;\">Shih-Yang Lin <span id=\"brandCjk\" style=\"color:var(--muted);font-weight:400;\">林世揚<\u002Fspan><\u002Fbutton>\n      <nav id=\"siteNav\" style=\"display:flex;gap:4px;align-items:center;\">\n        <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n          <button sc-camel-on-click=\"{{ item.onClick }}\" style=\"{{ item.style }}\" style-hover=\"color:var(--ink);\">{{ item.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main id=\"siteMain\" style=\"max-width:720px;margin:0 auto;padding:0 32px 128px;\">\n\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n    <section style=\"padding-top:88px;\">\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin:0 0 22px;\">Assistant Professor · Economics<\u002Fp>\n      <h1 style=\"font-size:clamp(34px,8.5vw,52px);line-height:1.04;letter-spacing:-0.025em;font-weight:600;margin:0 0 18px;\">Shih-Yang Lin<span style=\"color:var(--muted);font-weight:400;\"> 林世揚<\u002Fspan><\u002Fh1>\n      <p style=\"font-size:18px;line-height:1.5;color:var(--muted);margin:0 0 40px;max-width:560px;\">Department of Economics, National Dong Hwa University<\u002Fp>\n      <p style=\"font-size:19px;line-height:1.7;margin:0 0 44px;max-width:600px;text-wrap:pretty;\">I am an Assistant Professor in the Department of Economics at National Dong Hwa University. My research focuses on macroeconomics and econometrics — spanning financial frictions, inflation inequality, and the econometrics of policy evaluation.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:96px;\">\n        <a href=\"mailto:your.email@gms.ndhu.edu.tw\" style=\"display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 15px;border:1px solid var(--faint);border-radius:999px;color:var(--ink);background:var(--panel);\">✉ Email<\u002Fa>\n        <a href=\"https://orcid.org/\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 15px;border:1px solid var(--faint);border-radius:999px;color:var(--ink);background:var(--panel);\">◎ ORCID<\u002Fa>\n        <button sc-camel-on-click=\"{{ goCV }}\" style=\"display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 15px;border:1px solid var(--faint);border-radius:999px;color:var(--ink);background:var(--panel);cursor:pointer;\">↧ CV<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"margin-bottom:88px;\">\n        <p style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin:0 0 28px;\">Education<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:26px;\">\n          <div style=\"display:grid;grid-template-columns:64px 1fr;gap:20px;align-items:baseline;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);\">2025<\u002Fspan>\n            <div><div style=\"font-size:17px;font-weight:600;\">Ph.D. in Economics<\u002Fdiv><div style=\"color:var(--muted);font-size:15px;margin-top:2px;\">National Taiwan University<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:64px 1fr;gap:20px;align-items:baseline;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);\">2016<\u002Fspan>\n            <div><div style=\"font-size:17px;font-weight:600;\">M.A. in Economics<\u002Fdiv><div style=\"color:var(--muted);font-size:15px;margin-top:2px;\">National Taiwan University<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:64px 1fr;gap:20px;align-items:baseline;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);\">2008<\u002Fspan>\n            <div><div style=\"font-size:17px;font-weight:600;\">B.A. in Political Economy<\u002Fdiv><div style=\"color:var(--muted);font-size:15px;margin-top:2px;\">National Sun Yat-Sen University<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-bottom:88px;\">\n        <p style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin:0 0 24px;\">Research Interests<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n          <span style=\"font-size:15px;padding:8px 16px;border:1px solid var(--faint);border-radius:8px;background:var(--panel);\">Macroeconomics<\u002Fspan>\n          <span style=\"font-size:15px;padding:8px 16px;border:1px solid var(--faint);border-radius:8px;background:var(--panel);\">Financial Economics<\u002Fspan>\n          <span style=\"font-size:15px;padding:8px 16px;border:1px solid var(--faint);border-radius:8px;background:var(--panel);\">Econometrics<\u002Fspan>\n          <span style=\"font-size:15px;padding:8px 16px;border:1px solid var(--faint);border-radius:8px;background:var(--panel);\">Labor Economics<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin:0;\">Selected Publications<\u002Fp>\n          <button sc-camel-on-click=\"{{ goResearch }}\" style=\"background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);padding:0;\">All research →<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;\">\n          <div style=\"padding:22px 0;border-top:1px solid var(--faint);\">\n            <div style=\"font-size:17px;font-weight:600;line-height:1.4;\">U.S. Inflation Inequality between 2010 and 2023<\u002Fdiv>\n            <div style=\"color:var(--muted);font-size:15px;margin-top:6px;\">with YiLi Chien and Yi-Chan Tsai · <em style=\"font-family:Newsreader,serif;font-style:italic;\">Federal Reserve Bank of St. Louis Review<\u002Fem>, 2026<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:22px 0;border-top:1px solid var(--faint);\">\n            <div style=\"font-size:17px;font-weight:600;line-height:1.4;\">Financial Frictions and Uncertainty Shocks<\u002Fdiv>\n            <div style=\"color:var(--muted);font-size:15px;margin-top:6px;\">with Yi-Chan Tsai and Po-Yuan Wang · <em style=\"font-family:Newsreader,serif;font-style:italic;\">Macroeconomic Dynamics<\u002Fem>, 2025<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:22px 0;border-top:1px solid var(--faint);border-bottom:1px solid var(--faint);\">\n            <div style=\"font-size:17px;font-weight:600;line-height:1.4;\">Estimating the Willingness to Pay for Voting when Absentee Voting is not Allowed<\u002Fdiv>\n            <div style=\"color:var(--muted);font-size:15px;margin-top:6px;\">with C.Y. Cyrus Chu and Wen-Jen Tsay · <em style=\"font-family:Newsreader,serif;font-style:italic;\">Social Science Quarterly<\u002Fem>, 2021<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isResearch }}\" hint-placeholder-val=\"{{ true }}\">\n    <section style=\"padding-top:88px;\">\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin:0 0 18px;\">Research<\u002Fp>\n      <h1 style=\"font-size:clamp(32px,7vw,44px);line-height:1.05;letter-spacing:-0.025em;font-weight:600;margin:0 0 72px;\">Publications &amp; Working Papers<\u002Fh1>\n\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin:0 0 4px;\">Refereed Journal Articles<\u002Fp>\n      <div style=\"margin-bottom:64px;\">\n        <div style=\"padding:26px 0;border-bottom:1px solid var(--faint);display:grid;grid-template-columns:34px 1fr;gap:18px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--faint);color:var(--muted);padding-top:2px;\">01<\u002Fspan>\n          <div>\n            <div style=\"font-size:18px;font-weight:600;line-height:1.4;\">U.S. Inflation Inequality between 2010 and 2023<\u002Fdiv>\n            <div style=\"color:var(--muted);font-size:15px;margin-top:7px;line-height:1.5;\">with YiLi Chien and Yi-Chan Tsai · <em style=\"font-family:Newsreader,serif;font-style:italic;\">Federal Reserve Bank of St. Louis Review<\u002Fem>, 2026, 108(2): 1–22<\u002Fdiv>\n            <a href=\"https://doi.org/10.20955/r.2026.02\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;display:inline-block;margin-top:10px;\">DOI: 10.20955/r.2026.02 ↗<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:26px 0;border-bottom:1px solid var(--faint);display:grid;grid-template-columns:34px 1fr;gap:18px;\">\n          <span style=\" div><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <p style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin:0 0 20px;border-bottom:1px solid var(--faint);padding-bottom:12px;\">Grants &amp; Awards<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:16px;\">\n            <sc-for list=\"{{ awards }}\" as=\"a\" hint-placeholder-count=\"6\">\n              <div style=\"display:grid;grid-template-columns:120px 1fr;gap:20px;align-items:baseline;\">\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);\">{{ a.year }}<\u002Fspan>\n                <div style=\"font-size:16px;line-height:1.5;text-wrap:pretty;\">{{ a.name }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <p style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin:0 0 20px;border-bottom:1px solid var(--faint);padding-bottom:12px;\">Selected Publications<\u002Fp>\n          <ol style=\"margin:0;padding-left:22px;display:flex;flex-direction:column;gap:16px;\">\n            <li style=\"font-size:16px;line-height:1.55;padding-left:6px;\">U.S. Inflation Inequality between 2010 and 2023, <em style=\"font-family:Newsreader,serif;\">Federal Reserve Bank of St. Louis Review<\u002Fem> (2026).<\u002Fli>\n            <li style=\"font-size:16px;line-height:1.55;padding-left:6px;\">Financial Frictions and Uncertainty Shocks, <em style=\"font-family:Newsreader,serif;\">Macroeconomic Dynamics<\u002Fem> (2025).<\u002Fli>\n            <li style=\"font-size:16px;line-height:1.55;padding-left:6px;\">Estimating the Willingness to Pay for Voting when Absentee Voting is not Allowed, <em style=\"font-family:Newsreader,serif;\">Social Science Quarterly<\u002Fem> (2021).<\u002Fli>\n          <\u002Fol>\n          <button sc-camel-on-click=\"{{ goResearch }}\" style=\"background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);padding:14px 0 0;\">Full publication list →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <footer style=\"border-top:1px solid var(--faint);\">\n    <div style=\"max-width:720px;margin:0 auto;padding:32px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);\">\n      <span>Shih-Yang Lin · National Dong Hwa University<\u002Fspan>\n      <span>© 2026<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:940,&quot;height&quot;:900},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;oklch(0.55 0.10 255)&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[[&quot;oklch(0.55 0.10 255)&quot;,&quot;oklch(0.50 0.11 150)&quot;,&quot;oklch(0.52 0.14 35)&quot;,&quot;oklch(0.30 0.02 260)&quot;]],&quot;section&quot;:&quot;Theme&quot;},&quot;showAbstracts&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Research&quot;}}\">\nclass Component extends DCLogic {\n  state = { page: \"home\" };\n\n  componentDidMount() { this.applyAccent(); }\n  componentDidUpdate() { this.applyAccent(); }\n  applyAccent() {\n    const c = this.props.accentColor;\n    if (c) document.documentElement.style.setProperty(\"--accent\", c);\n  }\n\n  go(page) { this.setState({ page }); window.scrollTo(0, 0); }\n\n  renderVals() {\n    const page = this.state.page;\n    const nav = [\n      { key: \"home\", label: \"Home\" },\n      { key: \"research\", label: \"Research\" },\n      { key: \"teaching\", label: \"Teaching\" },\n      { key: \"cv\", label: \"CV\" },\n    ];\n    const navItems = nav.map((n) => ({\n      label: n.label,\n      onClick: () => this.go(n.key),\n      style:\n        \"background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px;padding:7px 12px;border-radius:8px;transition:color .15s;\" +\n        (page === n.key\n          ? \"color:var(--ink);font-weight:500;\"\n          : \"color:var(--muted);font-weight:400;\"),\n    }));\n\n    return {\n      page,\n      navItems,\n      isHome: page === \"home\",\n      isResearch: page === \"research\",\n      isTeaching: page === \"teaching\",\n      isCV: page === \"cv\",\n      goHome: () => this.go(\"home\"),\n      goResearch: () => this.go(\"research\"),\n      goCV: () => this.go(\"cv\"),\n      showAbstracts: this.props.showAbstracts ?? true,\n      workingPapers: [\n        {\n          title: \"The Labor Supply of Married Women and Spousal Tax Deductions in Japan\",\n          authors: \"with Minchung Hsu, Pei-Ju Liao, and Yi-Chan Tsai\",\n          abstract:\n            \"Population aging results in the problem of labor shortage. The labor force of Japanese females presents a solution to the Japanese government. Despite measures to improve the female labor force participation rate, encouraging women to work more or even shift from part-time jobs to full-time jobs was considered by the government. This study employs a standard incomplete markets model (or the Bewley-Huggett-Aiyagari style model) with heterogeneous households to examine the impact of two tax reforms (2004 and 2018) and a counterfactual reform abolishing spousal deduction on women's employment. Findings indicate that reducing spousal deduction after the 2004 tax reform boosts labor participation due to negative wealth effects, while the 2018 income threshold extensions result in a shift from full-time to part-time employment. Conversely, completely abolishing spousal deduction encourages a shift from part-time to full-time employment.\",\n          link: \"\", linkLabel: \"\",\n        },\n        {\n          title: \"A Two-Stage Pseudo-Maximum Likelihood Method for Poisson Models with Two Binary Endogenous Explanatory Variables\",\n          authors: \"with Chingmu Chen, Shin-Kun Peng, and Wen-Jen Tsay\",\n          abstract:\n            \"This paper introduces a novel estimator for the Poisson model with dual binary endogenous explanatory variables, addressing the need to quantify the effects of preferential economic integration agreements. We develop a two-stage pseudo-maximum likelihood estimator and derive analytical gradient matrices as well as Hessian matrices. These exact formulas improve computational speed significantly. Applying our approach to trade data, we find that preferential trade agreements have a positive impact on bilateral trade flows, while bilateral investment treaties have a negative effect. Additionally, the positive interaction term between these two treaties suggests that preferential trade agreements promote horizontal foreign direct investment.\",\n          link: \"\", linkLabel: \"\",\n        },\n        {\n          title: \"Robust Inference for Interrupted Time Series Models with Serial Dependent Disturbances\",\n          authors: \"with Wen-Jen Tsay and Hsin-Chieh Wong\",\n          abstract:\n            \"This paper considers inference problems related to the widely known interrupted time series (ITS) model, which is used as a quasi-experimental approach for evaluating policy intervention effects over time. Under a single-treatment-group design with serially correlated errors, we are the first to establish the asymptotic distribution of the ordinary least squares (OLS) estimators, which involves Brownian motion functionals and reveals a superconsistency property for the trending variables when the estimation error of the OLS estimator relative to the true coefficients is properly rescaled. Interestingly, the asymptotic covariance matrix of the rescaled estimator is proved to be invertible, even though the convergence rates of the OLS estimator for the level and trending variables differ, and the trending variables have different observation lengths. We further develop a studentized sieve bootstrap procedure and establish its asymptotic validity, providing an implementable inference method for small samples. In simulation experiments, the proposed bootstrap-based inference performs well, particularly under strong serial dependence.\",\n          link: \"https://dx.doi.org/10.2139/ssrn.5486489\", linkLabel: \"DOI: 10.2139/ssrn.5486489\",\n        },\n        {\n          title: \"Estimating Count Data Models with k Endogenous Switching Variables\",\n          authors: \"single-authored\",\n          abstract:\n            \"This paper proposes a novel approach to address the estimation and inference problems concerning the count data models featuring k binary endogenous explanatory variables. The proposed estimator fills the gap in various economic domains where discussions involve endogenous dummy variables (treatment effects) and sample selection. Under the correct model specification the full information maximum likelihood approach to estimation is introduced. Additionally, we develop both a one-stage quasi-maximum likelihood estimator and a two-stage quasi-maximum likelihood estimator to offer relatively robust alternatives.\",\n          link: \"\", linkLabel: \"\",\n        },\n        {\n          title: \"Empirical Relevance of Collateral-based and Cash Flow-based Credit Constraints in the U.S. Economy\",\n          authors: \"single-authored\",\n          abstract:\n            \"This study explores the significance of cash flow-based borrowing constraints, testing their empirical relevance across various settings. It investigates whether these constraints can explain key features of U.S. economic data, such as the lead-lag relationship and volatility of residential and nonresidential investments. The study also compares cash flow-based constraints with asset-based counterparts to determine which is more empirically relevant. Finally, it examines the primary driving force behind the Great Recession, focusing on the impacts of deteriorating credit conditions on households and firms. The aim is to provide a clearer understanding of the main factors responsible for the downturn, informing future policy decisions.\",\n          link: \"\", linkLabel: \"\",\n        },\n      ],\n      ndhuCourses: [\n        { name: \"Macrofinance\", term: \"Fall 2026\" },\n        { name: \"Macroeconomics (I)\", term: \"Fall 2026\" },\n        { name: \"Econometric Analysis (II)\", term: \"Spring 2026\" },\n        { name: \"Introduction to Big Data Analytics\", term: \"Fall 2025\" },\n        { name: \"Development Economics\", term: \"Fall 2025\" },\n        { name: \"Financial Markets\", term: \"Spring 2025–2026\" },\n        { name: \"Financial Economics (I)\", term: \"Spring 2025\" },\n      ],\n      ntuCourses: [\n        { name: \"Macroeconomic Theory (I)\", term: \"Fall 2019–2022\" },\n        { name: \"Macroeconomic Theory (II)\", term: \"Spring 2020–2021, 2024\" },\n        { name: \"Theory of Income and Employment (III)\", term: \"Fall 2022\" },\n        { name: \"Economics: Empirical Study and Forecasting (I & II)\", term: \"2019–2022\" },\n        { name: \"Basic Macroeconomics\", term: \"Summer 2022\" },\n        { name: \"Basic Quantitative Method\", term: \"Summer 2020–2022\" },\n        { name: \"Principle of Economics (I & II)\", term: \"2019–2020\" },\n      ],\n      awards: [\n        { year: \"2025\", name: \"Best Doctoral Dissertation Award (Sho-Chieh Tsiang Theoretical Economics), Taiwan Economic Association\" },\n        { year: \"2023\", name: \"Doctoral Dissertation Fellowship of the Humanities and Social Sciences, National Science and Technology Council\" },\n        { year: \"2022\", name: \"Asia Bank Scholarship, National Taiwan University\" },\n        { year: \"2020\", name: \"Liu Ta-Chung Scholarship, National Taiwan University\" },\n        { year: \"2019\", name: \"Harold H.C. Han Scholarship, National Taiwan University\" },\n        { year: \"2018\", name: \"Chu, Cyrus C. Y. and Chen, Tain-Jy Scholarship, National Taiwan University\" },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
